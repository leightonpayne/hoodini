[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hoodini"
version = "1.0.0"
description = "magic gene-neighborhood analyses"
authors = [{name = "Mario R. Mestre", email = "mario.mestre@bio.ku.dk"}]
readme = "README.md"

[project.scripts]
hoodini = "hoodini.__main__:main"
deep_mmseqs = "hoodini.deep_mmseqs:main"
deep_jackhmmer = "hoodini.deep_jackhmmer:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["hoodini", "hoodini.*"]

[tool.setuptools.package-data]
hoodini = ["**"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 100
combine_as_imports = true
known_first_party = ["hoodini"]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["hoodini/data", "hoodini.egg-info"]

[tool.ruff.lint]
select = [
	"E",   # pycodestyle errors
	"F",   # pyflakes
	"I",   # import sorting
	"UP",  # pyupgrade
	"B",   # bugbear
	"C4",  # comprehensions
	"SIM", # simplify
	"N",   # naming
	"S",   # security
	"PL",  # light pylint-style checks
]
ignore = [
	"B905",  # allow zip without strict when intentional
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101"]

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
ignore_missing_imports = true
follow_imports = "skip"
show_error_codes = true
pretty = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q"
testpaths = ["tests"]
filterwarnings = [
	"ignore::DeprecationWarning",
]
