[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hoodini"
version = "1.0.0"
description = "magic gene-neighborhood analyses"
authors = [{name = "Mario R. Mestre", email = "mario.mestre@bio.ku.dk"}]
readme = "README.md"

[project.scripts]
hoodini = "hoodini.__main__:main"
deep_mmseqs = "hoodini.deep_mmseqs:main"
deep_jackhmmer = "hoodini.deep_jackhmmer:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["hoodini", "hoodini.*"]

[tool.setuptools.package-data]
hoodini = ["**"]
