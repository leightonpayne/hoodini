name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (check)
        run: black --check .

      - name: isort (check)
        run: isort --check-only .

      - name: Mypy (lenient, no deps)
        env:
          PYTHONPATH: src
        run: mypy src/hoodini || true

      - name: Pytest (placeholder)
        env:
          PYTHONPATH: src
        run: |
          if [ -d tests ]; then pytest -q; else echo "no tests yet"; fi
